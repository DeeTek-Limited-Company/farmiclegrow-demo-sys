version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: farmiclegrow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: farmiclegrow
      POSTGRES_PASSWORD: farmiclegrow
      POSTGRES_DB: farmiclegrow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
